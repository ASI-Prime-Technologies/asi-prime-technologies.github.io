<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-[#05080f]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Pitch Deck | ASI PRIME Technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #05080f; color: #f8fafc; background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0V0zm20 20h20v20H20V20zM0 20h20v20H0V20zM20 0h20v20H20V0z' fill='%230ea5e9' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E"); }
        .glass-card { background: rgba(5,8,15,0.6); backdrop-filter: blur(12px); border: 1px solid #1e293b; border-radius: 1.5rem; }
        .btn-pitch { background: #0ea5e9; transition: all 0.2s; display: inline-block; padding: 0.75rem 2rem; border-radius: 2rem; font-weight: 600; }
        .btn-pitch:hover { background: #0284c7; transform: translateY(-2px); }
        #progress-bar { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: linear-gradient(90deg, #0ea5e9, #00f6ff); z-index: 10000; }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
    <div class="max-w-4xl mx-auto px-4 py-32">
        <div class="glass-card p-8 text-center">
            <h1 class="text-3xl font-bold mb-4">ASI PRIME Master Pitch Deck</h1>
            <p class="text-gray-400 mb-8">Download our comprehensive institutional presentation (PDF) or view a preview below.</p>
            <div class="flex flex-wrap gap-4 justify-center mb-8">
                <a href="assets/asi-prime-pitch-deck.pdf" class="btn-pitch text-white">Download PDF (12 MB)</a>
                <a href="#preview" class="border border-brand-blue text-brand-blue hover:bg-brand-blue hover:text-white transition px-6 py-3 rounded-full font-mono text-sm">View Online Preview</a>
            </div>
            <div id="preview" class="border border-slate-800 rounded-lg overflow-hidden bg-slate-900">
                <iframe src="assets/asi-prime-pitch-deck.pdf" class="w-full h-[600px]" title="Pitch Deck Preview">Your browser does not support PDF preview. Please download the file.</iframe>
            </div>
            <p class="text-gray-500 text-xs mt-6">*For institutional investors only. Not for redistribution.</p>
        </div>
    </div>
    <footer class="bg-[#010204] pt-8 pb-6 border-t border-slate-800 text-center text-xs text-gray-500"><p>&copy; 2026 ASI PRIME TECHNOLOGIES HOLDINGS PLC</p></footer>
    <script>window.addEventListener('scroll', () => { const winScroll = document.body.scrollTop || document.documentElement.scrollTop; const height = document.documentElement.scrollHeight - document.documentElement.clientHeight; document.getElementById('progress-bar').style.width = (winScroll / height) * 100 + '%'; });</script>
</body>
</html>
