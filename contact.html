<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-[#05080f]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Questionnaire | ASI PRIME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #05080f; color: #f8fafc; background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0V0zm20 20h20v20H20V20zM0 20h20v20H0V20zM20 0h20v20H20V0z' fill='%230ea5e9' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E"); }
        .glass-card { background: rgba(5,8,15,0.7); backdrop-filter: blur(16px); border: 1px solid #1e293b; border-radius: 1.5rem; }
        .input-field, .select-field, .textarea-field { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.75rem 1rem; width: 100%; color: white; transition: all 0.2s; }
        .input-field:focus, .select-field:focus, .textarea-field:focus { border-color: #0ea5e9; outline: none; box-shadow: 0 0 0 3px rgba(14,165,233,0.2); }
        .btn-submit { background: #0ea5e9; border-radius: 0.75rem; padding: 0.875rem; font-weight: 600; width: 100%; transition: all 0.2s; cursor: pointer; }
        .btn-submit:hover { background: #0284c7; transform: translateY(-2px); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .alert { border-radius: 0.75rem; padding: 1rem; margin-bottom: 1rem; font-size: 0.875rem; }
        .alert-success { background: rgba(16,185,129,0.2); border: 1px solid #10b981; color: #10b981; }
        .alert-error { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #ef4444; }
        .hidden { display: none; }
    </style>
</head>
<body class="py-12 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="mb-6">
            <a href="index.html" class="text-brand-blue hover:underline flex items-center gap-2 text-sm">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                Back to Home
            </a>
        </div>

        <div class="glass-card p-6 md:p-8">
            <div class="text-center mb-8">
                <div class="flex justify-center mb-3">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <rect x="4" y="4" width="40" height="40" rx="8" stroke="#0ea5e9" stroke-width="2" fill="none"/>
                        <path d="M24 16 L24 32 M16 24 L32 24" stroke="#0ea5e9" stroke-width="2" stroke-linecap="square"/>
                        <circle cx="24" cy="24" r="6" stroke="#0ea5e9" stroke-width="1.5" fill="none"/>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold">Institutional Inquiry</h1>
                <p class="text-gray-400 mt-2">For allocators, family offices, and strategic partners</p>
            </div>

            <!-- Alert messages -->
            <div id="formAlert" class="alert hidden"></div>

            <form id="contactForm" action="https://formspree.io/f/xkokebpq" method="POST" class="space-y-6">
                <!-- Honeypot spam protection -->
                <input type="text" name="_gotcha" style="display:none">
                <input type="hidden" name="_subject" value="ASI PRIME - New Inquiry from Website">
                
                <div class="grid md:grid-cols-2 gap-5">
                    <div><label class="block text-sm font-medium mb-1">Full name *</label><input type="text" id="fullName" name="full_name" class="input-field" required></div>
                    <div><label class="block text-sm font-medium mb-1">Email *</label><input type="email" id="email" name="email" class="input-field" required></div>
                </div>
                <div class="grid md:grid-cols-2 gap-5">
                    <div><label class="block text-sm font-medium mb-1">Institution / Fund</label><input type="text" id="institution" name="institution" class="input-field"></div>
                    <div><label class="block text-sm font-medium mb-1">Role / Title</label><input type="text" id="role" name="role" class="input-field"></div>
                </div>

                <hr class="border-slate-800 my-2">
                <h3 class="text-lg font-semibold">Questionnaire (confidential)</h3>

                <div><label class="text-sm">1. Approximate AUM / mandate size</label><select id="aum" name="aum" class="select-field"><option value="< $50M">< $50M</option><option value="$50M – $250M">$50M – $250M</option><option value="$250M – $1B">$250M – $1B</option><option value="> $1B">> $1B</option></select></div>
                <div><label class="text-sm">2. Target asset classes</label><input type="text" id="assetClasses" name="asset_classes" class="input-field" placeholder="Equities, FX, commodities, crypto..."></div>
                <div><label class="text-sm">3. Current systematic / quant exposure?</label><select id="systematic" name="systematic" class="select-field"><option>Yes, fully systematic</option><option>Hybrid (discretionary + systematic)</option><option>Traditional only</option><option>Exploring</option></select></div>
                <div><label class="text-sm">4. Expected annual net return</label><select id="returnTarget" name="return_target" class="select-field"><option>5-10%</option><option>10-15%</option><option>15-20%</option><option>20%+</option></select></div>
                <div><label class="text-sm">5. How did you hear about us?</label><input type="text" id="referral" name="referral" class="input-field" placeholder="Bloomberg, FT, conference, referral..."></div>
                <div><label class="text-sm">6. Message / specific request</label><textarea rows="3" id="message" name="message" class="textarea-field" placeholder="DDQ request, strategy deck, meeting, etc."></textarea></div>

                <div class="flex items-start gap-2">
                    <input type="checkbox" id="privacyConsent" name="privacy_consent" value="true" required class="mt-1 accent-brand-blue">
                    <label class="text-sm text-gray-400">I consent to the processing of my data for this inquiry (GDPR compliant).</label>
                </div>

                <button type="submit" class="btn-submit text-white font-mono uppercase tracking-wider">Submit Inquiry</button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const alertDiv = document.getElementById('formAlert');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                
                if (response.ok) {
                    alertDiv.className = 'alert alert-success';
                    alertDiv.textContent = '✅ Your message has been sent. Our investor relations team will respond within 2 business days.';
                    alertDiv.classList.remove('hidden');
                    form.reset();
                    setTimeout(() => {
                        alertDiv.classList.add('hidden');
                    }, 8000);
                } else {
                    throw new Error('Formspree error');
                }
            } catch (err) {
                alertDiv.className = 'alert alert-error';
                alertDiv.textContent = '❌ There was a problem sending your message. Please email us directly at ir@asiprime.com.';
                alertDiv.classList.remove('hidden');
                setTimeout(() => alertDiv.classList.add('hidden'), 8000);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Inquiry';
            }
        });
    </script>
</body>
</html></html></html>
