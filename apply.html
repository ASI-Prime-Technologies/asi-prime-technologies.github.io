<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-[#05080f]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply | ASI PRIME Careers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #05080f; color: #f8fafc; }
        .glass-card { background: rgba(5,8,15,0.7); backdrop-filter: blur(12px); border: 1px solid #1e293b; }
        .input-field, .select-field { background: #0f172a; border: 1px solid #1e293b; color: white; border-radius: 0.5rem; padding: 0.75rem 1rem; width: 100%; }
        .input-field:focus, .select-field:focus { border-color: #0ea5e9; outline: none; }
        .btn-submit { background: #0ea5e9; transition: all 0.2s; padding: 0.75rem; border-radius: 0.5rem; font-weight: 600; }
        .btn-submit:hover { background: #0284c7; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-grid-pattern min-h-screen py-12">
    <div class="max-w-3xl mx-auto px-4">
        <div class="glass-card rounded-2xl p-8">
            <div class="flex items-center gap-3 mb-6">
                <a href="careers.html" class="text-brand-blue hover:underline text-sm">← Back to Careers</a>
                <span class="text-gray-600">|</span>
                <span class="text-xs font-mono text-gray-500">Secure Application</span>
            </div>
            <h1 class="text-3xl font-bold mb-2">Job Application</h1>
            <p id="roleLocationDisplay" class="text-brand-light text-sm mb-6"></p>
            
            <form id="applicationForm" class="space-y-5">
                <div class="grid md:grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium mb-1">First name *</label><input type="text" id="firstName" class="input-field" required></div>
                    <div><label class="block text-sm font-medium mb-1">Last name *</label><input type="text" id="lastName" class="input-field" required></div>
                </div>
                <div><label class="block text-sm font-medium mb-1">Email *</label><input type="email" id="email" class="input-field" required></div>
                <div><label class="block text-sm font-medium mb-1">Phone (optional)</label><input type="tel" id="phone" class="input-field"></div>
                <div><label class="block text-sm font-medium mb-1">LinkedIn / GitHub profile</label><input type="url" id="profileUrl" class="input-field" placeholder="https://linkedin.com/in/..."></div>
                <div><label class="block text-sm font-medium mb-1">Cover letter / Motivation</label><textarea id="coverLetter" rows="4" class="input-field" placeholder="Why are you interested in this role?"></textarea></div>
                <div><label class="block text-sm font-medium mb-1">Upload CV (PDF)</label><input type="file" id="cv" accept=".pdf" class="input-field p-2"></div>
                <div class="flex items-start gap-2">
                    <input type="checkbox" id="terms" required class="mt-1 accent-brand-blue">
                    <label class="text-sm text-gray-400">I confirm that the information provided is accurate and I agree to the <a href="terms.html" class="text-brand-blue">privacy policy</a>.</label>
                </div>
                <button type="submit" class="btn-submit w-full font-mono uppercase tracking-wider">Submit Application</button>
            </form>
            <p class="text-gray-500 text-xs text-center mt-6">All applications are encrypted. We will contact you within 10 business days.</p>
        </div>
    </div>

    <script>
        // Get role and location from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'Quantitative Researcher';
        const location = urlParams.get('location') || 'London';
        document.getElementById('roleLocationDisplay').innerText = `Applying for: ${role} (${location})`;

        document.getElementById('applicationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert(`Application for ${role} at ${location} submitted.\nOur recruitment team will review your CV and reach out.`);
            // In production, you would send form data to server
        });
    </script>
</body>
</html>
