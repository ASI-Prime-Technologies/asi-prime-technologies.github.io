<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-[#05080f]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Investor Portal | ASI PRIME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #05080f; color: #f8fafc; background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0V0zm20 20h20v20H20V20zM0 20h20v20H0V20zM20 0h20v20H20V0z' fill='%230ea5e9' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E"); }
        .glass-panel { background: rgba(5,8,15,0.6); backdrop-filter: blur(16px); border: 1px solid #1e293b; border-radius: 1.5rem; }
        .input-field { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.75rem 1rem; color: white; width: 100%; transition: all 0.2s; }
        .input-field:focus { border-color: #0ea5e9; outline: none; box-shadow: 0 0 0 3px rgba(14,165,233,0.2); }
        .btn-login { background: #0ea5e9; border-radius: 0.75rem; padding: 0.75rem; font-weight: 600; transition: all 0.2s; width: 100%; }
        .btn-login:hover { background: #0284c7; transform: translateY(-2px); }
        .success-check { stroke-dasharray: 50; stroke-dashoffset: 50; animation: drawCheck 0.5s ease forwards; }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <!-- Header with SVG logo -->
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="40" height="40" rx="8" stroke="#0ea5e9" stroke-width="2" fill="none"/>
                    <rect x="12" y="12" width="24" height="24" rx="4" fill="#0ea5e9" fill-opacity="0.2" stroke="#0ea5e9" stroke-width="1.5"/>
                    <path d="M24 20 L24 28 M20 24 L28 24" stroke="#0ea5e9" stroke-width="2" stroke-linecap="square"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">ASI PRIME</h1>
            <p class="text-gray-400 text-sm mt-1">Secure Investor Portal</p>
        </div>

        <div class="glass-panel p-8">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-mono text-gray-300 mb-1">Registered Email</label>
                    <input type="email" id="email" class="input-field" placeholder="investor@asiprime.com" required>
                </div>
                <div>
                    <label class="block text-sm font-mono text-gray-300 mb-1">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-400"><input type="checkbox" class="mr-2 accent-brand-blue"> Remember device</label>
                    <a href="#" class="text-brand-blue hover:underline">Reset credentials</a>
                </div>
                <button type="submit" class="btn-login text-white font-mono uppercase tracking-wider">Authenticate</button>
            </form>

            <div class="mt-6 pt-6 border-t border-slate-800 text-center">
                <p class="text-gray-500 text-xs">Multi‑factor authentication active</p>
                <p class="text-gray-500 text-xs mt-2">Demo: <span class="text-brand-light">demo@asiprime.com</span> / <span class="text-brand-light">password123</span></p>
            </div>
        </div>

        <!-- Success Modal (hidden initially) -->
        <div id="successModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 hidden transition-all">
            <div class="glass-panel p-8 max-w-sm w-full text-center transform transition-all scale-95">
                <div class="flex justify-center mb-4">
                    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                        <circle cx="32" cy="32" r="30" stroke="#0ea5e9" stroke-width="2" fill="none"/>
                        <path class="success-check" d="M20 32 L28 40 L44 24" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round" fill="none"/>
                    </svg>
                </div>
                <h3 class="text-white text-xl font-bold mb-2">Authenticated</h3>
                <p class="text-gray-400 text-sm mb-6">Redirecting to investor dashboard...</p>
                <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden"><div class="w-0 h-full bg-brand-blue animate-[progress_2s_ease-out]"></div></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes progress { from { width: 0%; } to { width: 100%; } }
    </style>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;
            if (email === 'demo@asiprime.com' && pwd === 'password123') {
                const modal = document.getElementById('successModal');
                modal.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'investor-dashboard.html'; // placeholder
                }, 2000);
            } else {
                alert('Invalid credentials. Use demo@asiprime.com / password123');
            }
        });
    </script>
</body>
</html>
