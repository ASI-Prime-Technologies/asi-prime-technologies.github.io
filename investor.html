<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-[#05080f]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor Login | ASI PRIME Technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #05080f; color: #f8fafc; }
        .glass-card { background: rgba(5,8,15,0.6); backdrop-filter: blur(16px); border: 1px solid #1e293b; }
        .input-field { background: #0f172a; border: 1px solid #1e293b; color: white; transition: all 0.2s; }
        .input-field:focus { border-color: #0ea5e9; outline: none; box-shadow: 0 0 0 2px rgba(14,165,233,0.2); }
        .btn-login { background: #0ea5e9; transition: all 0.2s; }
        .btn-login:hover { background: #0284c7; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-grid-pattern">

    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="glass-card rounded-2xl p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-brand-blue/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-brand-blue text-2xl">🔒</span>
                </div>
                <h2 class="text-2xl font-bold">Secure Investor Portal</h2>
                <p class="text-gray-400 text-sm mt-2">Access reporting, DDQ, and capital statements</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-mono text-gray-300 mb-1">Email address</label>
                    <input type="email" id="email" class="input-field w-full rounded-lg px-4 py-3 text-sm" placeholder="investor@asiprime.com" required>
                </div>
                <div>
                    <label class="block text-sm font-mono text-gray-300 mb-1">Password</label>
                    <input type="password" id="password" class="input-field w-full rounded-lg px-4 py-3 text-sm" placeholder="••••••••" required>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-400"><input type="checkbox" class="mr-2 accent-brand-blue"> Remember me</label>
                    <a href="#" class="text-brand-blue hover:underline">Forgot password?</a>
                </div>
                <button type="submit" class="btn-login w-full py-3 rounded-lg font-mono font-semibold uppercase tracking-wider">Login to Portal</button>
            </form>
            <p class="text-center text-gray-500 text-xs mt-6">Demo credentials: demo@asiprime.com / password123</p>
            <p class="text-center text-gray-500 text-xs mt-2">For institutional access, contact <a href="mailto:ir@asiprime.com" class="text-brand-blue">ir@asiprime.com</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;
            if (email === 'demo@asiprime.com' && pwd === 'password123') {
                alert('Demo login successful. Redirecting to investor dashboard...');
                // In real implementation, redirect to actual dashboard
                window.location.href = 'investor-dashboard.html';
            } else {
                alert('Invalid credentials. For demo use demo@asiprime.com / password123');
            }
        });
    </script>
</body>
</html>
